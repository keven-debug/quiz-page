<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Credit Consumption Tracker · Axya</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f1f9ff;
      --surface: #ffffff;
      --text: #081a33;
      --text-strong: #072b64;
      --text-muted: #4a5876;
      --text-soft: #8693a8;
      --border: #d6e3f0;
      --border-strong: #b8cce0;
      --accent: #2682fd;
      --accent-dark: #1d6cd9;
      --accent-tint: #e7f1ff;
      --success: #16a34a;
      --success-tint: #dcfce7;
      --warning: #E89B2C;
      --warning-tint: #fef3c7;
      --danger: #DC4444;
      --danger-tint: #fee2e2;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-sm: 0 1px 2px rgba(7,43,100,0.05);
      --shadow-md: 0 4px 24px rgba(7,43,100,0.07);
      --shadow-lg: 0 12px 48px rgba(7,43,100,0.10);
      --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --transition: 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .brand {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--text-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .header__title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-soft);
      letter-spacing: 0.02em;
    }

    /* ── Stat cards ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
    }
    .stat__label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 10px;
    }
    .stat__value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-strong);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat__unit {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-left: 4px;
    }
    .stat__delta {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-soft);
    }
    .stat--today   { border-top: 3px solid var(--accent); }
    .stat--week    { border-top: 3px solid #7cb9fd; }
    .stat--month   { border-top: 3px solid #b8d9ff; }
    .stat--alltime { border-top: 3px solid var(--border-strong); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .card__header {
      padding: 18px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card__title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-strong);
      letter-spacing: -0.01em;
    }
    .card__body { padding: 22px; }

    /* ── Log credit form ── */
    .form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 580px) {
      .form { grid-template-columns: 1fr; }
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }
    .field input, .field select {
      height: 40px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      width: 100%;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-tint);
    }
    .btn {
      height: 40px;
      padding: 0 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn--primary {
      background: var(--accent);
      color: white;
    }
    .btn--primary:hover { background: var(--accent-dark); }
    .btn--ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
    }
    .btn--ghost:hover {
      border-color: var(--border-strong);
      color: var(--text);
    }
    .btn--danger-ghost {
      background: transparent;
      color: var(--danger);
      border: none;
      padding: 0 8px;
      font-size: 13px;
      height: 28px;
    }
    .btn--danger-ghost:hover { background: var(--danger-tint); border-radius: 4px; }

    /* ── Daily bar chart ── */
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 100px;
      padding: 0 2px;
    }
    .chart__bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .chart__bar {
      width: 100%;
      background: var(--accent-tint);
      border: 1.5px solid var(--accent);
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      transition: height var(--transition);
      position: relative;
    }
    .chart__bar:hover .chart__tooltip { display: block; }
    .chart__tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-strong);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }
    .chart__label {
      font-size: 10px;
      color: var(--text-soft);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .chart__bar--today { background: var(--accent); border-color: var(--accent-dark); }
    .chart__bar--today .chart__tooltip { background: var(--accent-dark); }

    /* ── Events table ── */
    .events-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .events-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-soft);
      padding: 0 12px 12px;
      border-bottom: 1px solid var(--border);
    }
    .events-table td {
      padding: 12px;
      border-bottom: 1px solid var(--bg);
      vertical-align: middle;
    }
    .events-table tr:last-child td { border-bottom: none; }
    .events-table tr:hover td { background: var(--bg); }
    .credit-pill {
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      padding: 2px 10px;
      border-radius: 99px;
      background: var(--accent-tint);
      color: var(--accent-dark);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-soft);
    }
    .empty-state p { margin: 0; font-size: 14px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--accent-tint);
      color: var(--accent-dark);
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <span class="brand__dot"></span>
      Axya
    </div>
    <span class="header__title">Credit Consumption Tracker</span>
  </header>

  <!-- Stat cards -->
  <div class="stats">
    <div class="stat stat--today">
      <div class="stat__label">Today</div>
      <div><span class="stat__value" id="statToday">0</span><span class="stat__unit">cr</span></div>
      <div class="stat__delta" id="deltaToday">&nbsp;</div>
    </div>
    <div class="stat stat--week">
      <div class="stat__label">This Week</div>
      <div><span class="stat__value" id="statWeek">0</span><span class="stat__unit">cr</span></div>
      <div class="stat__delta" id="deltaWeek">&nbsp;</div>
    </div>
    <div class="stat stat--month">
      <div class="stat__label">This Month</div>
      <div><span class="stat__value" id="statMonth">0</span><span class="stat__unit">cr</span></div>
      <div class="stat__delta" id="deltaMonth">&nbsp;</div>
    </div>
    <div class="stat stat--alltime">
      <div class="stat__label">All Time</div>
      <div><span class="stat__value" id="statAll">0</span><span class="stat__unit">cr</span></div>
      <div class="stat__delta" id="deltaAll">&nbsp;</div>
    </div>
  </div>

  <!-- Log a credit event -->
  <div class="card">
    <div class="card__header">
      <span class="card__title">Log Credit Usage</span>
    </div>
    <div class="card__body">
      <form class="form" id="logForm">
        <div class="field">
          <label for="fDesc">Description</label>
          <input type="text" id="fDesc" placeholder="e.g. API call, quiz run…" required />
        </div>
        <div class="field">
          <label for="fAmount">Credits</label>
          <input type="number" id="fAmount" placeholder="1" min="0.01" step="0.01" required />
        </div>
        <button type="submit" class="btn btn--primary">Add</button>
      </form>
    </div>
  </div>

  <!-- 7-day chart -->
  <div class="card">
    <div class="card__header">
      <span class="card__title">Last 7 Days</span>
    </div>
    <div class="card__body">
      <div class="chart" id="chart"></div>
    </div>
  </div>

  <!-- Event log -->
  <div class="card">
    <div class="card__header">
      <span class="card__title">Event Log</span>
      <div class="toolbar">
        <span class="badge" id="eventCount">0 events</span>
        <button class="btn btn--ghost" id="exportBtn" style="height:32px;padding:0 14px;font-size:13px;">Export CSV</button>
        <button class="btn btn--ghost" id="clearBtn" style="height:32px;padding:0 14px;font-size:13px;color:var(--danger);border-color:var(--danger);">Clear All</button>
      </div>
    </div>
    <div class="card__body" style="padding:0">
      <div id="eventsContainer"></div>
    </div>
  </div>

</div>

<script>
  /* ── Storage ── */
  const STORE_KEY = 'axya_credit_events';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch { return []; }
  }

  function save(events) {
    localStorage.setItem(STORE_KEY, JSON.stringify(events));
  }

  /* ── Date helpers ── */
  function startOf(unit, d = new Date()) {
    const t = new Date(d);
    if (unit === 'day') {
      t.setHours(0, 0, 0, 0);
    } else if (unit === 'week') {
      // Monday
      const day = t.getDay(); // 0=Sun
      const diff = (day === 0 ? -6 : 1 - day);
      t.setDate(t.getDate() + diff);
      t.setHours(0, 0, 0, 0);
    } else if (unit === 'month') {
      t.setDate(1);
      t.setHours(0, 0, 0, 0);
    }
    return t;
  }

  function isoDate(d = new Date()) {
    return d.toISOString().slice(0, 10);
  }

  function friendlyDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function friendlyTime(ts) {
    return new Date(ts).toLocaleString(undefined, {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function last7Days() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      days.push(isoDate(d));
    }
    return days;
  }

  /* ── Aggregation ── */
  function sumWhere(events, predicate) {
    return events.filter(predicate).reduce((s, e) => s + e.amount, 0);
  }

  function computeStats(events) {
    const now = Date.now();
    const todayStart  = startOf('day').getTime();
    const weekStart   = startOf('week').getTime();
    const monthStart  = startOf('month').getTime();
    return {
      today:   sumWhere(events, e => e.ts >= todayStart),
      week:    sumWhere(events, e => e.ts >= weekStart),
      month:   sumWhere(events, e => e.ts >= monthStart),
      alltime: sumWhere(events, () => true)
    };
  }

  function computeDailyTotals(events) {
    const days = last7Days();
    const totals = {};
    days.forEach(d => totals[d] = 0);
    events.forEach(e => {
      const d = isoDate(new Date(e.ts));
      if (d in totals) totals[d] += e.amount;
    });
    return { days, totals };
  }

  /* ── Render ── */
  function fmt(n) {
    return Number.isInteger(n) ? n.toLocaleString() : n.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function renderStats(events) {
    const s = computeStats(events);
    document.getElementById('statToday').textContent  = fmt(s.today);
    document.getElementById('statWeek').textContent   = fmt(s.week);
    document.getElementById('statMonth').textContent  = fmt(s.month);
    document.getElementById('statAll').textContent    = fmt(s.alltime);

    // Previous-period delta helpers
    const prevDayStart  = startOf('day', new Date(Date.now() - 86400000)).getTime();
    const prevDay       = sumWhere(events, e => e.ts >= prevDayStart && e.ts < startOf('day').getTime());
    setDelta('deltaToday', s.today, prevDay, 'vs yesterday');

    const prevWeekStart = new Date(startOf('week').getTime() - 7 * 86400000).getTime();
    const prevWeek      = sumWhere(events, e => e.ts >= prevWeekStart && e.ts < startOf('week').getTime());
    setDelta('deltaWeek', s.week, prevWeek, 'vs last week');

    const prevMonthStart = new Date(startOf('month'));
    prevMonthStart.setMonth(prevMonthStart.getMonth() - 1);
    const prevMonthEnd   = startOf('month').getTime();
    const prevMonth      = sumWhere(events, e => e.ts >= prevMonthStart.getTime() && e.ts < prevMonthEnd);
    setDelta('deltaMonth', s.month, prevMonth, 'vs last month');

    document.getElementById('deltaAll').textContent = events.length + ' event' + (events.length !== 1 ? 's' : '') + ' total';
  }

  function setDelta(id, current, previous, label) {
    const el = document.getElementById(id);
    if (previous === 0 && current === 0) { el.textContent = ' '; return; }
    if (previous === 0) { el.textContent = label; return; }
    const pct = ((current - previous) / previous * 100).toFixed(0);
    const sign = pct >= 0 ? '+' : '';
    el.textContent = sign + pct + '% ' + label;
    el.style.color = pct < 0 ? 'var(--success)' : pct > 0 ? 'var(--danger)' : 'var(--text-soft)';
  }

  function renderChart(events) {
    const { days, totals } = computeDailyTotals(events);
    const max = Math.max(...Object.values(totals), 1);
    const today = isoDate();
    const chart = document.getElementById('chart');
    chart.innerHTML = '';
    days.forEach(day => {
      const val = totals[day];
      const pct = Math.max((val / max) * 88, val > 0 ? 4 : 0);
      const isToday = day === today;
      const wrap = document.createElement('div');
      wrap.className = 'chart__bar-wrap';
      wrap.innerHTML = `
        <div class="chart__bar${isToday ? ' chart__bar--today' : ''}"
             style="height:${pct}px">
          <div class="chart__tooltip">${friendlyDate(day)}: ${fmt(val)} cr</div>
        </div>
        <div class="chart__label">${day.slice(5)}</div>
      `;
      chart.appendChild(wrap);
    });
  }

  function renderEvents(events) {
    const count = document.getElementById('eventCount');
    count.textContent = events.length + ' event' + (events.length !== 1 ? 's' : '');

    const container = document.getElementById('eventsContainer');
    if (events.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>No credit events yet. Add your first one above.</p></div>';
      return;
    }

    const sorted = [...events].sort((a, b) => b.ts - a.ts);
    const rows = sorted.map(e => `
      <tr>
        <td style="color:var(--text-muted);font-size:13px">${friendlyTime(e.ts)}</td>
        <td style="color:var(--text)">${e.desc || '—'}</td>
        <td><span class="credit-pill">${fmt(e.amount)} cr</span></td>
        <td><button class="btn btn--danger-ghost" data-id="${e.id}">✕</button></td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table class="events-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Description</th>
            <th>Credits</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    container.querySelectorAll('[data-id]').forEach(btn => {
      btn.addEventListener('click', () => deleteEvent(btn.dataset.id));
    });
  }

  function render() {
    const events = load();
    renderStats(events);
    renderChart(events);
    renderEvents(events);
  }

  /* ── Actions ── */
  function addEvent(desc, amount) {
    const events = load();
    events.push({ id: crypto.randomUUID(), ts: Date.now(), desc, amount });
    save(events);
    render();
  }

  function deleteEvent(id) {
    const events = load().filter(e => e.id !== id);
    save(events);
    render();
  }

  function clearAll() {
    if (!confirm('Delete all credit events? This cannot be undone.')) return;
    save([]);
    render();
  }

  function exportCSV() {
    const events = load();
    if (events.length === 0) { alert('Nothing to export.'); return; }
    const header = 'timestamp,description,credits\n';
    const rows = events
      .sort((a, b) => b.ts - a.ts)
      .map(e => `${new Date(e.ts).toISOString()},${JSON.stringify(e.desc)},${e.amount}`)
      .join('\n');
    const blob = new Blob([header + rows], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'credit-consumption.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ── Wire-up ── */
  document.getElementById('logForm').addEventListener('submit', e => {
    e.preventDefault();
    const desc   = document.getElementById('fDesc').value.trim();
    const amount = parseFloat(document.getElementById('fAmount').value);
    if (!desc || isNaN(amount) || amount <= 0) return;
    addEvent(desc, amount);
    e.target.reset();
    document.getElementById('fDesc').focus();
  });

  document.getElementById('clearBtn').addEventListener('click', clearAll);
  document.getElementById('exportBtn').addEventListener('click', exportCSV);

  /* ── Init ── */
  render();
</script>
</body>
</html>
